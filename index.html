<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ UYARI: KULLANICI ERİŞİM DETAYI ⚡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body, html { width: 100%; height: 100%; background-color: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; overflow: hidden; cursor: none; }

        /* Matrix Kod Yağmuru (Sadece Terminal Arkasında Kalacak) */
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15; }

        /* Ana Terminal Ekranı */
        #terminal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 8, 0, 0.95); display: flex; align-items: center; justify-content: center; z-index: 10; }
        #terminal-content { width: 95%; max-width: 900px; height: 85vh; padding: 30px; border: 2px solid #0f0; border-radius: 5px; box-shadow: 0 0 50px rgba(0, 255, 0, 0.3); background-color: #000; display: flex; flex-direction: column; justify-content: space-between; z-index: 11; }
        
        #log-container { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; font-size: 14px; line-height: 1.6; text-shadow: 0 0 5px #0f0; }
        
        /* Kullanıcı İnteraktif Giriş Alanı */
        #input-area { display: flex; align-items: center; font-size: 16px; color: #00ff00; border-top: 1px dashed #0f0; padding-top: 15px; }
        #prompt-symbol { margin-right: 10px; font-weight: bold; }
        #user-input { background: transparent; border: none; color: #0ff; font-family: 'Courier New', monospace; font-size: 16px; width: 100%; text-shadow: 0 0 8px #0ff; }

        .log { margin-bottom: 8px; }
        .log-error { color: #f00 !important; text-shadow: 0 0 10px #f00; font-weight: bold; }
        .log-success { color: #0ff !important; font-weight: bold; text-shadow: 0 0 8px #0ff; }
        .log-warning { color: #ff0 !important; }

        /* Lütfen Bekleyin Ekranı (Z-Index En Üstte Olacak Şekilde Sabitlendi) */
        #waiting-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 100; flex-direction: column; align-items: center; justify-content: center; color: #ff0000; text-shadow: 0 0 30px #f00; font-family: 'Courier New', monospace; }
        #waiting-overlay h1 { font-size: 2.8em; letter-spacing: 5px; margin-bottom: 30px; animation: glitch 0.3s infinite; text-align: center; }
        
        /* Bekleme Ekranı Yükleme Çubuğu */
        .wait-progress-bar { border: 2px solid #f00; width: 350px; height: 35px; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(255, 0, 0, 0.7); background: #110000; display: block !important; }
        #wait-progress-fill { background: #f00; width: 0%; height: 100%; box-shadow: 0 0 15px #f00; }
        #wait-progress-text { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: #fff; font-weight: bold; font-size: 16px; text-shadow: 1px 1px 3px #000; z-index: 105; }

        /* 5 Saniyelik Karanlık Katmanı */
        #darkness-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000000; z-index: 200; }

        /* Kesinlikle Reklamsız Rickroll Kıyamet Ekranı */
        #rickroll-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: #000; overflow: hidden; }
        #rick-video { position: absolute; width: 140%; height: 140%; left: -20%; top: -20%; object-fit: cover; filter: grayscale(100%) brightness(1.8) contrast(2.5) hue-rotate(130deg); }

        /* Başlangıç Karşılama Ekranı */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; cursor: pointer; color: #f00; text-shadow: 0 0 20px #f00; }
        #start-overlay h1 { font-size: 2.3em; margin-bottom: 20px; text-transform: uppercase; text-align: center; padding: 0 20px; }
        #start-overlay p { font-size: 1.2em; animation: pulse 1s infinite; }

        /* Şiddetli Deprem Efekti */
        .earthquake { animation: hardShake 0.05s infinite !important; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(-4deg); color: #0ff; }
            40% { transform: skew(4deg); }
            60% { transform: skew(-2deg); color: #f0f; }
            100% { transform: skew(0deg); }
        }

        @keyframes hardShake {
            0% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-15px, -10px) rotate(-2.5deg); }
            20% { transform: translate(18px, 13px) rotate(2.5deg); }
            30% { transform: translate(-13px, 15px) rotate(-1.5deg); }
            40% { transform: translate(15px, -18px) rotate(3deg); }
            50% { transform: translate(-20px, 11px) rotate(-2deg); }
            60% { transform: translate(13px, -15px) rotate(2.5deg); }
            70% { transform: translate(-15px, 18px) rotate(-3deg); }
            80% { transform: translate(20px, -13px) rotate(2deg); }
            90% { transform: translate(-13px, -18px) rotate(-2.5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
    </style>
</head>
<body id="main-body">

    <canvas id="matrix-canvas"></canvas>

    <!-- Giriş Onay Ekranı -->
    <div id="start-overlay">
        <h1>⚠️ SİSTEM ENJEKSİYON MERKEZİ ⚠️</h1>
        <p>[ PROTOKOLÜ VE MATRIX AKIŞINI BAŞLATMAK İÇİN TIKLAYIN ]</p>
    </div>

    <!-- Terminal Alanı -->
    <div id="terminal-overlay">
        <div id="terminal-content">
            <div id="log-container"></div>
            <div id="input-area">
                <span id="prompt-symbol">admin@core_bypass:~#</span>
                <input type="text" id="user-input" autocomplete="off" placeholder="Girdi bekleniyor...">
            </div>
        </div>
    </div>

    <!-- Yükleme Çubuğu İçeren Bekleme Ekranı -->
    <div id="waiting-overlay">
        <h1>⚠️ LÜTFEN BEKLEYİN... ⚠️</h1>
        <div class="wait-progress-bar">
            <div id="wait-progress-fill"></div>
            <div id="wait-progress-text">0%</div>
        </div>
    </div>

    <!-- 5 Saniyelik Boşluk/Karanlık Katmanı -->
    <div id="darkness-overlay"></div>

    <!-- REKLAMSIZ RICKROLL VİDEOSU -->
    <div id="rickroll-overlay">
        <video id="rick-video" preload="auto" loop crossorigin="anonymous">
            <source src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Rick_Astley_-_Never_Gonna_Give_You_Up%20%28low_quality%29.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        // Arka Plandaki Matrix Kod Yağmuru
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const alphabet = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ01";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        // Değişken Tanımlamaları
        const startOverlay = document.getElementById('start-overlay');
        const logContainer = document.getElementById('log-container');
        const userInput = document.getElementById('user-input');
        const waitingOverlay = document.getElementById('waiting-overlay');
        const waitProgressFill = document.getElementById('wait-progress-fill');
        const waitProgressText = document.getElementById('wait-progress-text');
        const darknessOverlay = document.getElementById('darkness-overlay');
        const rickrollOverlay = document.getElementById('rickroll-overlay');
        const rickVideo = document.getElementById('rick-video');
        const mainBody = document.getElementById('main-body');

        let step = 0;

        function addLog(text, type = 'info', delay = 0) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const p = document.createElement('p');
                    p.className = 'log';
                    if (type === 'error') p.className += ' log-error';
                    if (type === 'success') p.className += ' log-success';
                    if (type === 'warning') p.className += ' log-warning';
                    p.textContent = text;
                    logContainer.appendChild(p);
                    logContainer.scrollTop = logContainer.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        // İnteraktif Soru Öncesi Uzun Süreli Akış
        async function startHackingSequence() {
            userInput.disabled = true;
            await addLog("[BOOT] Çekirdek modülleri optimize ediliyor...", 'info', 150);
            await addLog("[INFO] Gizli tünel kuruluyor...", 'info', 300);
            await addLog("[INFO] Bağlantı rotası: SEYŞELLER -> İSVİÇRE -> YEREL", 'info', 400);
            await addLog("[SUCCESS] Proxy katmanları başarıyla gizlendi.", 'success', 250);
            await addLog("[WARNING] Sunucu Güvenlik Protokolü algılandı!", 'warning', 500);
            await addLog("[INFO] SQL Enjeksiyon şablonları hazırlanıyor...", 'info', 300);
            await addLog("[SUCCESS] Güvenlik sertifikası geçersiz kılındı.", 'success', 400);
            await addLog("---------------------------------------------------------", 'info', 100);
            await addLog("[❓] SORU 1: Bellek sızıntısı exploit kodunu tetiklemek istiyor musunuz? (evet / hayır)", 'warning', 300);
            userInput.disabled = false;
            userInput.focus();
            step = 1;
        }

        // Kullanıcı Etkileşim Yönetimi
        userInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = userInput.value.trim().toLowerCase();
                userInput.value = '';

                if (step === 1) {
                    userInput.disabled = true;
                    if (val === 'evet' || val === 'e' || val === 'yes' || val === 'y') {
                        await addLog(`> ${val}`, 'success', 100);
                        await addLog("[OK] İstek onaylandı. Sızma paketleri enjekte ediliyor...", 'success', 400);
                        await addLog("[❓] SORU 2: Hedef sunucu ana bilgisayar şifresini girin (Herhangi bir şifre yazın):", 'warning', 500);
                        userInput.disabled = false;
                        userInput.focus();
                        step = 2;
                    } else {
                        await addLog(`> ${val}`, 'error', 100);
                        await addLog("[ERROR] Yanıt reddedildi. Devam etmek için terminale 'evet' yazmalısınız.", 'error', 400);
                        userInput.disabled = false;
                        userInput.focus();
                    }
                } 
                else if (step === 2) {
                    userInput.disabled = true;
                    await addLog(`> **********`, 'success', 100);
                    await addLog("[RUN] Şifre algoritması analiz ediliyor...", 'info', 500);
                    await addLog("[FATAL ERROR] ANAHTAR UYUŞMAZLIĞI! HEDEF SİSTEM LOGLARI KİLİTLEDİ!", 'error', 600);
                    await addLog("[SYSTEM] Acil durum bypass motoru çalıştırılıyor...", 'warning', 400);
                    
                    // Sayıların ve blokların akış ekranı
                    await addLog("[INFO] Ham bellek blokları manipüle ediliyor...", 'info', 400);
                    await addLog("[DATA] Blok 0x7FFF64: BAŞARILI", 'success', 300);
                    await addLog("[DATA] Blok 0x8A2C12: VERİ ALINDI", 'success', 200);
                    await addLog("[DATA] Blok 0x3C1D89: BYPASS EDİLDİ", 'success', 200);
                    await addLog("[PROGRESS] Sunucu imtiyazları zorlanıyor...", 'info', 300);
                    await addLog("[SUCCESS] Kök (Root) yetkileri zorla alındı.", 'success', 400);
                    
                    // Kesin olarak Bekleme ekranına geçiş
                    setTimeout(triggerWaitingScreen, 1000);
                }
            }
        });

        // Kırmızı Yükleme Çubuğu Aşaması
        function triggerWaitingScreen() {
            document.getElementById('terminal-overlay').style.display = 'none';
            waitingOverlay.style.display = 'flex';
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 2.5 + 0.5; // Yavaş yavaş dolma hilesi
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    waitProgressFill.style.width = '100%';
                    waitProgressText.textContent = '100%';
                    // 100% olunca 5 saniyelik mutlak karanlığa geç
                    setTimeout(triggerDarkness, 1000);
                } else {
                    const rounded = Math.floor(progress);
                    waitProgressFill.style.width = rounded + '%';
                    waitProgressText.textContent = rounded + '%';
                }
            }, 100);
        }

        // 5 Saniyelik Karanlık/Sessizlik Odası
        function triggerDarkness() {
            waitingOverlay.style.display = 'none';
            darknessOverlay.style.display = 'block';
            
            // Tam 5 saniye boyunca kapkaranlık kalır (Arkadaşın bilgisayar çöktü sanacak)
            setTimeout(triggerRickroll, 5000);
        }

        // Kesinlikle Reklamsız Rickroll Patlaması
        function triggerDarkness() {
            waitingOverlay.style.display = 'none';
            darknessOverlay.style.display = 'block';
            setTimeout(triggerRickroll, 5000);
        }

        function triggerRickroll() {
            darknessOverlay.style.display = 'none';
            rickrollOverlay.style.display = 'block';
            
            mainBody.classList.add('earthquake');
            
            rickVideo.muted = false;
            rickVideo.volume = 1.0;
            
            // Wikimedia mp4 doğrudan oynatma tetiklemesi
            const playPromise = rickVideo.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Oynatma hatası:", error);
                });
            }
        }

        // Tıklama ile Başlatma
        startOverlay.addEventListener('click', () => {
            startOverlay.style.display = 'none';
            startHackingSequence();
        });
    </script>
</body>
</html>
