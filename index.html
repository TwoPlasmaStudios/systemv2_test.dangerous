<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ SİSTEM KRİTİK ⚡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body, html { width: 100%; height: 100%; background-color: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; overflow: hidden; cursor: none; }

        /* Arka Plan Kod Yağmuru */
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; }

        /* Ana Terminal */
        #terminal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 20, 0, 0.85); display: flex; align-items: center; justify-content: center; z-index: 10; font-weight: bold; text-shadow: 0 0 10px #0f0; }
        #terminal-content { width: 90%; max-width: 800px; padding: 30px; border: 2px solid #0f0; border-radius: 10px; box-shadow: 0 0 30px rgba(0, 255, 0, 0.3); background-color: rgba(0, 0, 0, 0.9); }

        /* Log ve Bar Stilleri */
        .log { margin-bottom: 15px; opacity: 0; animation: fadeIn 0.1s forwards; }
        .log-error { color: #f00 !important; font-weight: bold; text-shadow: 0 0 15px #f00; }
        .log-success { color: #0ff !important; font-weight: bold; }
        .progress-bar { border: 2px solid #0f0; width: 100%; height: 25px; margin: 20px 0; overflow: hidden; position: relative; }
        #progress-fill { background: linear-gradient(90deg, #0f0 0%, #0ff 100%); width: 0%; height: 100%; transition: width 0.3s ease; box-shadow: 0 0 20px rgba(0, 255, 0, 0.8); }
        #progress-text { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: #000; font-weight: bold; z-index: 2; }

        /* Screamer Sahnesi */
        #rickroll-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: #000; }
        #rick-video-container { position: absolute; width: 150%; height: 150%; left: -25%; top: -25%; filter: grayscale(100%) brightness(1.5) contrast(2) hue-rotate(90deg); animation: chaoticVibration 0.05s infinite; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Başlangıç Tıklama Ekranı */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; cursor: pointer; color: #f00; text-shadow: 0 0 20px #f00; }
        #start-overlay h1 { font-size: 3em; margin-bottom: 20px; text-transform: uppercase; }
        #start-overlay p { font-size: 1.2em; animation: pulse 1s infinite; }

        /* Animasyonlar */
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes chaoticVibration {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            20% { transform: translate(-5px, 8px) scale(1.02) rotate(1deg); }
            40% { transform: translate(7px, -4px) scale(0.98) rotate(-1deg); }
            60% { transform: translate(-8px, -6px) scale(1.03) rotate(0.5deg); }
            80% { transform: translate(9px, 5px) scale(0.97) rotate(-0.5deg); }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); }
        }
    </style>
</head>
<body>

    <!-- Arka Plan Kod Yağmuru (Canvas) -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Terminal Ekranı -->
    <div id="terminal-overlay">
        <div id="terminal-content">
            <div id="logs"></div>
            <div class="progress-bar">
                <div id="progress-fill"></div>
                <div id="progress-text">0%</div>
            </div>
        </div>
    </div>

    <!-- Screamer Sahnesi -->
    <div id="rickroll-overlay">
        <div id="rick-video-container">
            <iframe id="rick-video" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <!-- Başlangıç Tıklama Ekranı -->
    <div id="start-overlay">
        <h1 class="log-error">⚠️ KRİTİK ERİŞİM HATASI ⚠️</h1>
        <p>[ DEVAM ETMEK İÇİN TIKLAYIN ]</p>
    </div>

    <script>
        // Matrix Yağmuru Scripti
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const katakana = "アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン";
        const latin = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const nums = "0123456789";
        const alphabet = katakana + latin + nums;
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        // Terminal Log Scripti
        const startOverlay = document.getElementById('start-overlay');
        const logsDiv = document.getElementById('logs');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const rickrollOverlay = document.getElementById('rickroll-overlay');
        const rickVideo = document.getElementById('rick-video');
        const terminalOverlay = document.getElementById('terminal-overlay');

        const hackLogs = [
            { type: 'info', text: "[BOOT] Sistem çekirdeği yükleniyor..." },
            { type: 'info', text: "[INFO] Hedef belirlendi: 192.168.1.1" },
            { type: 'info', text: "[RUN] SSH 'brute force' saldırısı başlatıldı..." },
            { type: 'error', text: "[ERROR] Güvenlik duvarı v12 aktif. Bypass gerekiyor." },
            { type: 'success', text: "[OK] Güvenlik duvarı devre dışı bırakıldı." },
            { type: 'info', text: "[RUN] Root şifresi kırılıyor (SHA-256)..." },
            { type: 'error', text: "[WARNING] Paket kaybı tespit edildi! Veri bütünlüğü tehlikede." },
            { type: 'success', text: "[OK] Veri akışı stabilize edildi." },
            { type: 'info', text: "[RUN] Yönetici paneline sızılıyor..." },
            { type: 'error', text: "[WARNING] SİSTEM AŞIRI ISINIYOR! VERİ TABANI BOZULDU." },
            { type: 'success', text: "[BOOT] Kalan veriler kurtarılıyor..." }
        ];

        let logIndex = 0;
        let progress = 0;

        function updateProgress() {
            if (progress < 100) {
                progress += Math.random() * 2 + 0.5; // Rastgele artış
                if (progress > 100) progress = 100;
                const roundedProgress = Math.floor(progress);
                progressFill.style.width = roundedProgress + '%';
                progressText.textContent = roundedProgress + '%';
                setTimeout(updateProgress, Math.random() * 200 + 50); // Hız değişimi
            }
        }

        function showLog() {
            if (logIndex < hackLogs.length) {
                const logData = hackLogs[logIndex];
                const p = document.createElement('p');
                p.className = 'log ' + (logData.type === 'error' ? 'log-error' : logData.type === 'success' ? 'log-success' : '');
                p.textContent = logData.text;
                logsDiv.appendChild(p);
                logIndex++;
                setTimeout(showLog, Math.random() * 1000 + 200); // Log hızı
            } else {
                // Loglar bittiğinde Rickroll'u başlat
                setTimeout(triggerRickroll, 2000);
            }
        }

        function triggerRickroll() {
            terminalOverlay.style.display = 'none';
            rickrollOverlay.style.display = 'block';
            // Rickroll videosu, ses açık ve siyah-beyaz, bozuk efektli
            rickVideo.src = "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=0&controls=0&modestbranding=1&rel=0&iv_load_policy=3&disablekb=1";
        }

        startOverlay.addEventListener('click', () => {
            startOverlay.style.display = 'none';
            showLog();
            updateProgress();
        });
    </script>
</body>
</html>
